{% extends 'base.html' %}

{% block page_title %}Add Child{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Add New Child</h2>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Personal Information -->
            <h3 style="margin-bottom: 1.25rem; color: var(--dark); font-size: 1rem; font-weight: 600;">
                <i class="fas fa-user" style="margin-right: 0.5rem; color: var(--primary);"></i>
                Personal Information
            </h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div class="form-group">
                    <label>Child ID (leave blank for auto-generate)</label>
                    <input type="text" name="child_id" class="form-control" placeholder="e.g., CHILD001 or leave blank">
                    <small style="color: var(--secondary);">Optional - leave blank to auto-generate (e.g., CHILD-20260304-0012)</small>
                </div>
                <div class="form-group">
                    <label>Date of Birth *</label>
                    <input type="date" name="date_of_birth" class="form-control" required>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Profile Photo</label>
                <input type="file" name="profile_photo" class="form-control" accept="image/*" style="padding: 0.5rem;">
            </div>
            
            <!-- Education & Medical -->
            <h3 style="margin-bottom: 1.25rem; color: var(--dark); font-size: 1rem; font-weight: 600;">
                <i class="fas fa-graduation-cap" style="margin-right: 0.5rem; color: var(--primary);"></i>
                Education & Medical
            </h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div class="form-group">
                    <label>School</label>
                    <select name="school" class="form-control">
                        <option value="">-- Select School --</option>
                        {% for school in schools %}
                        <option value="{{ school.id }}">{{ school.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Chronic Medical Condition</label>
                    <input type="text" name="chronic_medical_condition" class="form-control" placeholder="e.g., Asthma, Diabetes">
                </div>
            </div>
            
            <!-- Financial Support -->
            <h3 style="margin-bottom: 1.25rem; color: var(--dark); font-size: 1rem; font-weight: 600;">
                <i class="fas fa-wallet" style="margin-right: 0.5rem; color: var(--primary);"></i>
                Financial Support
            </h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div class="form-group">
                    <label>Who provides most household income?</label>
                    <input type="text" name="income_provider" class="form-control">
                </div>
                <div class="form-group">
                    <label>Who pays for education?</label>
                    <input type="text" name="education_payer" class="form-control">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Who pays for medical bills?</label>
                <input type="text" name="medical_payer" class="form-control">
            </div>
            
            <!-- Household -->
            <h3 style="margin-bottom: 1.25rem; color: var(--dark); font-size: 1rem; font-weight: 600;">
                <i class="fas fa-home" style="margin-right: 0.5rem; color: var(--primary);"></i>
                Household
            </h3>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Select Household *</label>
                <select name="household" class="form-control" required>
                    <option value="">-- Select Household --</option>
                    {% for household in households %}
                    <option value="{{ household.id }}">{{ household.household_name }} ({{ household.number_of_people }} people)</option>
                    {% endfor %}
                </select>
            </div>
            
            <!-- Actions -->
            <div style="display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Child Record
                </button>
                <a href="{% url 'children-directory' %}" class="btn btn-outline">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
