{% extends 'base.html' %}

{% block title %}Create Survey - Charity Management System{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-poll"></i> Create Survey</h2>
        <a href="{% url 'surveys' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Surveys
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post" id="surveyForm">
                {% csrf_token %}
                
                <h5 class="mb-3">Survey Details</h5>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Survey Title *</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Survey Type</label>
                        <select name="survey_type" class="form-select">
                            <option value="other">Other</option>
                            <option value="household">Household Assessment</option>
                            <option value="child">Child Assessment</option>
                            <option value="feedback">Feedback Survey</option>
                            <option value="evaluation">Program Evaluation</option>
                        </select>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_active" id="isActive" checked>
                            <label class="form-check-label" for="isActive">
                                Active (Available for volunteers)
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Deadline (optional)</label>
                        <input type="date" name="deadline" class="form-control">
                    </div>
                </div>

                <hr>
                
                <h5 class="mb-3">Survey Questions</h5>
                <div id="questionsContainer">
                    <!-- Questions will be added here dynamically -->
                </div>
                
                <button type="button" class="btn btn-outline-primary mb-4" onclick="addQuestion()">
                    <i class="fas fa-plus"></i> Add Question
                </button>

                <hr>
                
                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'surveys' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Create Survey
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
let questionCount = 0;

function addQuestion() {
    questionCount++;
    const container = document.getElementById('questionsContainer');
    const questionHtml = `
        <div class="card mb-3 question-card" id="question_${questionCount}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0">Question ${questionCount}</h6>
                    <button type="button" class="btn btn-sm btn-danger" onclick="removeQuestion(${questionCount})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="row">
                    <div class="col-md-8">
                        <label class="form-label">Question Text *</label>
                        <input type="text" name="question_text[]" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Question Type</label>
                        <select name="question_type[]" class="form-select" onchange="toggleChoices(this, ${questionCount})">
                            <option value="text">Short Text</option>
                            <option value="textarea">Long Text</option>
                            <option value="number">Number</option>
                            <option value="date">Date</option>
                            <option value="yes_no">Yes/No</option>
                            <option value="choice">Single Choice</option>
                            <option value="multiple">Multiple Choice</option>
                        </select>
                    </div>
                </div>
                <div class="row mt-2 choices-field" id="choices_${questionCount}" style="display:none;">
                    <div class="col-md-12">
                        <label class="form-label">Choices (comma-separated)</label>
                        <input type="text" name="question_choices[]" class="form-control" placeholder="Option 1, Option 2, Option 3">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_required[]" value="${questionCount}" id="required_${questionCount}">
                            <label class="form-check-label" for="required_${questionCount}">
                                Required question
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    container.insertAdjacentHTML('beforeend', questionHtml);
}

function removeQuestion(id) {
    document.getElementById(`question_${id}`).remove();
    updateQuestionNumbers();
}

function updateQuestionNumbers() {
    const cards = document.querySelectorAll('.question-card');
    cards.forEach((card, index) => {
        card.querySelector('h6').textContent = `Question ${index + 1}`;
    });
}

function toggleChoices(select, id) {
    const choicesField = document.getElementById(`choices_${id}`);
    if (select.value === 'choice' || select.value === 'multiple') {
        choicesField.style.display = 'block';
    } else {
        choicesField.style.display = 'none';
    }
}

// Add first question by default
document.addEventListener('DOMContentLoaded', function() {
    addQuestion();
});
</script>
{% endblock %}
